
name: on-demand-test

on:
  workflow_dispatch:
  #push:
  #  branches: [ "master" ]
#  pull_request:
#    branches: [ "master" ]

    inputs:
      runRemotelyInDocker:
        description: "Run test in Selenium Grid Docker container"
        default: false
        type: boolean

jobs:
  build:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write

    steps:
    - uses: actions/checkout@v7

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Check Docker version
      run: docker --version

    - name: Start Selenium Grid in Docker
      id: start-selenium-grid
      if : ${{ github.event.inputs.runRemotelyInDocker == 'true' }}
      run: |
        docker compose -f selenium-docker/compose.yaml up -d
        sleep 5 # Wait for the Selenium Grid to start

    - name: Build and run tests with Maven
      run: mvn test -DsuiteXmlFile="src/test/testsuite/smokeTest.xml" -Dremote=${{ github.event.inputs.runRemotelyInDocker }}
      #run: mvn -B package --file pom.xml
      
    - name: Upload test reports
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-reports
        path: |
          ./target/logs/
          .target/reports/
          ./target/surefire-reports/
          
    - name: Publish Test Report
      uses: mikepenz/action-junit-report@v6
      if: success() || failure() # always run even if the previous step fails
      with:
        report_paths: '**/target/surefire-reports/TEST-*.xml'
        detailed_summary: true
    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    #- name: Update dependency graph
    #  uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6

    - name: Cleanup Selenium Grid Docker container
      if : ${{ always() && steps.start-selenium-grid.outcome == 'success' }}
      run: docker compose -f selenium-docker/compose.yaml down